name: 📢 Test & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  COVERAGE_MIN: "78"

jobs:
  lint:
    name: 🚨 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  vuln:
    name: 🔒 Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

  test:
    name: ✅ Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Zenroom
        run: |
          curl -fsSL -o /tmp/zenroom.zip https://github.com/dyne/Zenroom/releases/download/v5.31.2/zenroom-linux.zip
          unzip -o /tmp/zenroom.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/zenroom
          zenroom -h

      - name: Run tests with coverage gate
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | awk -v min="$COVERAGE_MIN" '/^total:/ {
            gsub("%", "", $3)
            printf "Total coverage: %s%% (required: %s%%)\n", $3, min
            if (($3 + 0) < (min + 0)) exit 1
          }'

  release:
    name: 🔖 Semantic release & publish binaries
    needs: [lint, vuln, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: go-semantic-release/action@v1
        with:
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.txt
            dist/*.spdx.json
